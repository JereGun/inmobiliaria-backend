spring.application.name=Inmobiliaria API

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/inmobiliaria_api}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB

app.security.jwt.secret=${JWT_SECRET:inmobiliaria-api-development-secret-key-change-me-please-2026}
app.security.jwt.expiration=${JWT_EXPIRATION:86400000}
app.security.bootstrap-admin.enabled=${BOOTSTRAP_ADMIN_ENABLED:true}
app.security.bootstrap-admin.email=${BOOTSTRAP_ADMIN_EMAIL:admin@inmobiliaria.local}
app.security.bootstrap-admin.password=${BOOTSTRAP_ADMIN_PASSWORD:ChangeMe123!}

app.frontend.url=${FRONTEND_URL:http://localhost:5173}

app.invoices.auto-generation.cron=${AUTO_INVOICE_GENERATION_CRON:0 0 9 1 * *}

app.notifications.rental-adjustment.cron=${RENTAL_ADJUSTMENT_NOTIFICATION_CRON:0 0 8 * * *}
app.notifications.rental-adjustment.lookahead-days=${RENTAL_ADJUSTMENT_NOTIFICATION_LOOKAHEAD_DAYS:7}
app.notifications.overdue-rent.cron=${OVERDUE_RENT_NOTIFICATION_CRON:0 5 8 * * *}
app.notifications.overdue-rent.grace-days=${OVERDUE_RENT_NOTIFICATION_GRACE_DAYS:0}
